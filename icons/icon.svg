<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a15"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad)"/>
  
  <!-- Flask/Beaker shape — centered in maskable safe zone (inner 80%) -->
  <g filter="url(#neonGlow)" transform="translate(0, -20)">
    <!-- Flask body -->
    <path d="M180 160 L180 290 L140 385 Q120 425 160 445 L352 445 Q392 425 372 385 L332 290 L332 160" 
          fill="none" stroke="#00ffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Flask neck -->
    <path d="M180 160 L180 115 Q180 95 200 95 L312 95 Q332 95 332 115 L332 160" 
          fill="none" stroke="#00ffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Liquid inside -->
    <path d="M160 370 Q140 405 175 425 L337 425 Q372 405 352 370 L320 310 L192 310 Z" 
          fill="#ff00ff" opacity="0.6"/>
    
    <!-- Bubbles -->
    <circle cx="220" cy="360" r="15" fill="#ff00ff" opacity="0.8"/>
    <circle cx="280" cy="380" r="10" fill="#00ffff" opacity="0.8"/>
    <circle cx="250" cy="340" r="12" fill="#ffff00" opacity="0.8"/>
    
    <!-- Drop -->
    <path d="M256 195 Q280 235 256 265 Q232 235 256 195 Z" 
          fill="#00ff00" opacity="0.9"/>
  </g>
</svg>













































