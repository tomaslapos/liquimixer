  VAPING_BANNERS.forEach(b => {
    html += `<div class="banner-row">
      <div id="svg-${b.id}">${vapingSVG(b)}</div>
      <div class="info"><strong>${b.label}</strong>Headline: <code>${b.headline}</code><br><br>

      <div class="info"><strong>${b.label}</strong>Headline: <code>${b.headline}</code><br><br>

  });
  container.innerHTML = html;
}

function dlOne(id) {
  const svgEl = document.querySelector(`#svg-${id} svg`);
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const data = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([data], {type:'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(img, 0, 0, W, H);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = `liquimixer-${id}-1200x900.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

async function downloadAll() {
  const all = [...HOOKAH_BANNERS, ...VAPING_BANNERS, ...NEUTRAL_MIXING_BANNERS, ...NEUTRAL_BLEND_BANNERS];
  for (let i = 0; i < all.length; i++) {
    dlOne(all[i].id);
    await new Promise(r => setTimeout(r, 800));
  }
}
