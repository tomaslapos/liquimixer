<br>
<button onclick="downloadPNG()">Stáhnout PNG (1200×900)</button>
<canvas id="canvas" width="1200" height="900" style="display:none;"></canvas>

<script>
async function downloadPNG() {
  const svg = document.getElementById('bannerSvg');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  
  const svgData = new XMLSerializer().serializeToString(svg);
  const svgBlob = new Blob([svgData], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(svgBlob);
  
  const img = new Image();
  img.onload = function() {
    ctx.drawImage(img, 0, 0, 1200, 900);
    URL.revokeObjectURL(url);
    
    const pngUrl = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = 'liquimixer-nargile-tr-1200x900.png';
    link.href = pngUrl;
    link.click();
  };
  img.src = url;
}
</script>
