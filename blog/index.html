<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiquiMixer Blog — E-Liquid & Shisha Mixing Guides</title>
    <meta name="description" content="Expert guides, recipes and calculators for mixing e-liquid and hookah/shisha. Tips for beginners and pros in 31 languages.">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="LiquiMixer Blog — E-Liquid & Shisha Mixing Guides">
    <meta property="og:description" content="Expert guides, recipes and calculators for mixing e-liquid and hookah/shisha.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.liquimixer.com/blog/">
    <meta property="og:image" content="https://www.liquimixer.com/icons/icon-512x512.png">
    <meta property="og:site_name" content="LiquiMixer">
    <link rel="canonical" href="https://www.liquimixer.com/blog/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/blog/blog.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "LiquiMixer Blog",
        "description": "Expert guides, recipes and calculators for mixing e-liquid and hookah/shisha.",
        "url": "https://www.liquimixer.com/blog/",
        "publisher": {
            "@type": "Organization",
            "name": "LiquiMixer",
            "url": "https://www.liquimixer.com",
            "logo": { "@type": "ImageObject", "url": "https://www.liquimixer.com/icons/icon-512x512.png" }
        },
        "inLanguage": "en"
    }
    </script>
</head>
<body>
<div class="neon-grid"></div>
<div class="blog-container">
    <nav class="blog-nav">
        <a href="/blog/" class="blog-logo">LIQUIMIXER</a>
        <a href="/index.html" class="blog-app-link">Open Calculator</a>
    </nav>

    <!-- LIST VIEW (default) -->
    <div id="blog-list-view">
        <div class="blog-list-header">
            <h1>LiquiMixer Blog</h1>
            <p>Guides, recipes & tips for mixing e-liquid and hookah/shisha</p>
        </div>

        <div class="blog-categories" id="blog-categories">
            <button class="blog-category-btn active" data-category="">All</button>
            <button class="blog-category-btn" data-category="guide">Guides</button>
            <button class="blog-category-btn" data-category="recipe">Recipes</button>
            <button class="blog-category-btn" data-category="calculator">Calculators</button>
            <button class="blog-category-btn" data-category="hookah">Hookah</button>
            <button class="blog-category-btn" data-category="comparison">Comparisons</button>
        </div>

        <div class="blog-cards" id="blog-cards">
            <div class="blog-loading">Loading articles...</div>
        </div>
    </div>

    <!-- ARTICLE VIEW (hidden by default, shown when slug is in URL) -->
    <div id="blog-article-view" style="display:none;">
        <div class="blog-loading" id="article-loading">Loading article...</div>
        <div id="article-container"></div>
    </div>

    <div class="blog-site-footer">
        <a href="/index.html">LiquiMixer — E-Liquid & Shisha Calculator</a>
        <p>&copy; 2025–2026 LiquiMixer.</p>
    </div>
</div>

<script>
(function() {
    const API_BASE = 'https://ikgtygabrrvbqyffcqjd.supabase.co/functions/v1/blog';
    const DOMAIN = 'https://www.liquimixer.com';

    // Detect user locale from browser or URL
    function detectLocale() {
        // Check URL params first
        const params = new URLSearchParams(window.location.search);
        if (params.get('locale')) return params.get('locale');

        // Check path: /blog/en/slug or /blog/de/slug
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        if (pathParts.length >= 2 && pathParts[0] === 'blog') {
            const possibleLocale = pathParts[1];
            if (possibleLocale.match(/^[a-z]{2}(-[A-Z]{2})?$/)) {
                return possibleLocale;
            }
        }

        // Browser language
        const browserLang = navigator.language || navigator.userLanguage || 'en';
        const short = browserLang.toLowerCase();
        
        // Map browser locale to supported locales
        const SUPPORTED = ['cs','sk','en','de','pl','fr','it','es','pt','nl','ja','ko','tr','uk','ru','sv','da','no','fi','el','ar-SA','zh-CN','zh-TW','hu','et','lv','lt','ro','hr','bg','sr'];
        
        if (SUPPORTED.includes(browserLang)) return browserLang;
        if (SUPPORTED.includes(short.split('-')[0])) return short.split('-')[0];
        if (short.startsWith('ar')) return 'ar-SA';
        if (short.startsWith('zh') && short.includes('tw')) return 'zh-TW';
        if (short.startsWith('zh')) return 'zh-CN';
        
        return 'en';
    }

    // Get slug from URL
    function getSlugFromURL() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('slug')) return params.get('slug');

        const pathParts = window.location.pathname.split('/').filter(Boolean);
        // /blog/en/my-article-slug
        if (pathParts.length >= 3 && pathParts[0] === 'blog') {
            return pathParts[2];
        }
        return null;
    }

    const locale = detectLocale();
    const slug = getSlugFromURL();

    // Set HTML lang and dir
    document.documentElement.lang = locale;
    if (locale === 'ar-SA') document.documentElement.dir = 'rtl';

    // ARTICLE VIEW
    if (slug) {
        document.getElementById('blog-list-view').style.display = 'none';
        document.getElementById('blog-article-view').style.display = 'block';
        loadArticle(slug, locale);
    } else {
        // LIST VIEW
        loadArticles(locale, '');
        setupCategoryFilters(locale);
    }

    async function loadArticles(loc, category) {
        const cards = document.getElementById('blog-cards');
        cards.innerHTML = '<div class="blog-loading">Loading articles...</div>';

        try {
            let url = `${API_BASE}?action=list&locale=${loc}&limit=50`;
            if (category) url += `&category=${category}`;

            const res = await fetch(url);
            const data = await res.json();

            if (!data.articles || data.articles.length === 0) {
                cards.innerHTML = '<div class="blog-empty">No articles yet. Check back soon!</div>';
                return;
            }

            cards.innerHTML = data.articles.map(function(a) {
                const date = a.published_at ? new Date(a.published_at).toLocaleDateString(loc === 'cs' ? 'cs-CZ' : loc, { year: 'numeric', month: 'long', day: 'numeric' }) : '';
                const href = `/blog/${a.locale}/${a.slug}`;
                return `<a href="${href}" class="blog-card">
                    <span class="blog-card-category">${esc(a.category)}</span>
                    <h2>${esc(a.title)}</h2>
                    <p class="blog-card-excerpt">${esc(a.excerpt || a.meta_description || '')}</p>
                    <span class="blog-card-date">${date}</span>
                </a>`;
            }).join('');
        } catch (err) {
            cards.innerHTML = '<div class="blog-empty">Failed to load articles. Please try again.</div>';
            console.error('Blog load error:', err);
        }
    }

    async function loadArticle(articleSlug, loc) {
        const container = document.getElementById('article-container');
        const loading = document.getElementById('article-loading');

        try {
            const res = await fetch(`${API_BASE}?action=get&slug=${articleSlug}&locale=${loc}`);
            const data = await res.json();

            if (!data.article) {
                loading.textContent = 'Article not found.';
                return;
            }

            const a = data.article;
            const date = a.published_at ? new Date(a.published_at).toLocaleDateString(loc === 'cs' ? 'cs-CZ' : loc, { year: 'numeric', month: 'long', day: 'numeric' }) : '';

            // Update page meta
            document.title = a.title + ' | LiquiMixer Blog';
            updateMeta('description', a.meta_description || '');
            updateMeta('og:title', a.title, 'property');
            updateMeta('og:description', a.meta_description || '', 'property');
            updateMeta('og:url', `${DOMAIN}/blog/${a.locale}/${a.slug}`, 'property');

            // Update canonical
            var canonical = document.querySelector('link[rel="canonical"]');
            if (canonical) canonical.href = `${DOMAIN}/blog/${a.locale}/${a.slug}`;

            loading.style.display = 'none';
            container.innerHTML = `
                <article class="blog-article">
                    <header class="blog-header">
                        <span class="blog-category">${esc(a.category)}</span>
                        <h1 class="blog-title">${esc(a.title)}</h1>
                        <div class="blog-meta">
                            <time datetime="${a.published_at || ''}">${date}</time>
                            <span class="blog-author">${a.author || 'LiquiMixer'}</span>
                        </div>
                    </header>
                    <div class="blog-content">${a.content}</div>
                    <footer class="blog-footer">
                        <div class="blog-cta">
                            <a href="/index.html" class="neon-button"><span>START MIXING</span></a>
                            <p class="cta-note">Free. No registration. 5000+ flavors with auto-%.</p>
                        </div>
                    </footer>
                </article>`;
        } catch (err) {
            loading.textContent = 'Failed to load article.';
            console.error('Article load error:', err);
        }
    }

    function setupCategoryFilters(loc) {
        document.querySelectorAll('.blog-category-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.blog-category-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                loadArticles(loc, btn.dataset.category);
            });
        });
    }

    function updateMeta(name, content, attr) {
        attr = attr || 'name';
        var el = document.querySelector('meta[' + attr + '="' + name + '"]');
        if (el) el.setAttribute('content', content);
    }

    function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>
</body>
</html>
